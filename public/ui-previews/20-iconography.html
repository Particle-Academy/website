<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:22px 24px;background:#fff;font-family:var(--font-sans);color:var(--fg-1)}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;margin-bottom:10px}
  .ic{aspect-ratio:1;border:1px solid #e4e4e7;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--fg-2)}
  .ic svg{width:60%;height:60%;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
  .sizes{display:flex;align-items:center;gap:14px;margin-top:8px;color:var(--fg-2)}
  .sizes span{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-left:2px}
  .sizes svg{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style></head>
<body>
  <div class="meta">Lucide · line · 2px stroke · currentColor · sized via Size scale</div>
  <div class="grid">
    <div class="ic"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="ic"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
    <div class="ic"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>
    <div class="ic"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div>
  </div>
  <div class="sizes">
    <div style="display:flex;align-items:center;gap:4px"><svg viewBox="0 0 24 24" style="width:12px;height:12px"><polyline points="20 6 9 17 4 12"/></svg><span>xs 12</span></div>
    <div style="display:flex;align-items:center;gap:4px"><svg viewBox="0 0 24 24" style="width:12px;height:12px"><polyline points="20 6 9 17 4 12"/></svg><span>sm 12</span></div>
    <div style="display:flex;align-items:center;gap:4px"><svg viewBox="0 0 24 24" style="width:16px;height:16px"><polyline points="20 6 9 17 4 12"/></svg><span>md 16</span></div>
    <div style="display:flex;align-items:center;gap:4px"><svg viewBox="0 0 24 24" style="width:20px;height:20px"><polyline points="20 6 9 17 4 12"/></svg><span>lg 20</span></div>
    <div style="display:flex;align-items:center;gap:4px"><svg viewBox="0 0 24 24" style="width:24px;height:24px"><polyline points="20 6 9 17 4 12"/></svg><span>xl 24</span></div>
  </div>
</body></html>
