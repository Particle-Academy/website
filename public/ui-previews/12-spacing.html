<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:22px 24px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;flex-direction:column;gap:8px}
  .line{display:flex;align-items:center;gap:12px}
  .bar{height:12px;background:#a5b4fc;border-radius:3px}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:120px}
</style></head>
<body>
<div class="row">
  <div class="line"><div class="lbl">space-1 · 4px</div><div class="bar" style="width:4px"></div></div>
  <div class="line"><div class="lbl">space-2 · 8px</div><div class="bar" style="width:8px"></div></div>
  <div class="line"><div class="lbl">space-3 · 12px</div><div class="bar" style="width:12px"></div></div>
  <div class="line"><div class="lbl">space-4 · 16px</div><div class="bar" style="width:16px"></div></div>
  <div class="line"><div class="lbl">space-6 · 24px</div><div class="bar" style="width:24px"></div></div>
  <div class="line"><div class="lbl">space-8 · 32px</div><div class="bar" style="width:32px"></div></div>
  <div class="line"><div class="lbl">space-12 · 48px</div><div class="bar" style="width:48px"></div></div>
  <div class="line"><div class="lbl">space-16 · 64px</div><div class="bar" style="width:64px"></div></div>
</div>
</body></html>
