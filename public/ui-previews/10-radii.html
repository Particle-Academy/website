<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .col{display:flex;flex-direction:column;gap:6px;align-items:center}
  .box{width:100%;height:64px;background:#e0e7ff;border:1px solid #c7d2fe}
  .name{font-size:12px;font-weight:600}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
</style></head>
<body>
<div class="row">
  <div class="col"><div class="box" style="border-radius:4px"></div><div class="name">sm</div><div class="tok">0.25rem · badges</div></div>
  <div class="col"><div class="box" style="border-radius:6px"></div><div class="name">md</div><div class="tok">0.375rem · inputs</div></div>
  <div class="col"><div class="box" style="border-radius:8px"></div><div class="name">lg</div><div class="tok">0.5rem · buttons</div></div>
  <div class="col"><div class="box" style="border-radius:12px"></div><div class="name">xl</div><div class="tok">0.75rem · cards</div></div>
  <div class="col"><div class="box" style="border-radius:16px"></div><div class="name">2xl</div><div class="tok">1rem · modals</div></div>
  <div class="col"><div class="box" style="border-radius:9999px"></div><div class="name">full</div><div class="tok">circle · avatars</div></div>
</div>
</body></html>
