<!doctype html>
<html><head><meta charset="utf-8"><title>Modal & Toast</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:22px 24px;background:#fafafa;font-family:var(--font-sans);color:var(--fg-1);display:flex;gap:14px}
  .scrim{width:50%;background:rgba(9,9,11,.18);border-radius:12px;display:flex;align-items:center;justify-content:center;padding:18px;position:relative}
  .modal{width:88%;background:#fff;border-radius:14px;box-shadow:0 20px 25px -5px rgba(0,0,0,.10),0 8px 10px -6px rgba(0,0,0,.08);border:1px solid #e4e4e7}
  .mhead{padding:11px 13px;border-bottom:1px solid #f4f4f5;font-weight:600;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .mbody{padding:13px;font-size:12px;color:var(--fg-2)}
  .mfoot{padding:9px 13px;border-top:1px solid #f4f4f5;display:flex;justify-content:flex-end;gap:6px}
  .btn{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #e4e4e7;background:#fff;font-weight:500;cursor:pointer}
  .btn.primary{background:#3b82f6;color:#fff;border-color:#2563eb}
  .toasts{width:50%;display:flex;flex-direction:column;gap:8px;align-items:flex-end;padding-top:6px}
  .toast{background:#fff;border:1px solid #e4e4e7;border-radius:10px;box-shadow:0 10px 15px -3px rgba(0,0,0,.08);padding:9px 12px;display:flex;gap:8px;align-items:flex-start;width:92%}
  .toast .ic{width:16px;height:16px;flex:0 0 auto}
  .toast .ic.ok{color:#10b981}
  .toast .ic.warn{color:#f59e0b}
  .toast h6{margin:0;font-size:12px;font-weight:600}
  .toast p{margin:0;font-size:11px;color:var(--fg-3)}
  svg{width:100%;height:100%;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round}
</style></head>
<body>
  <div class="scrim">
    <div class="modal">
      <div class="mhead">Delete workspace<span style="color:var(--fg-3);cursor:pointer">×</span></div>
      <div class="mbody">This will permanently delete "Particle Academy" and 12 boards. This action cannot be undone.</div>
      <div class="mfoot"><button class="btn">Cancel</button><button class="btn primary" style="background:#ef4444;border-color:#dc2626">Delete</button></div>
    </div>
  </div>
  <div class="toasts">
    <div class="toast"><div class="ic ok"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div><h6>Saved</h6><p>Workspace settings updated.</p></div></div>
    <div class="toast"><div class="ic warn"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></div><div><h6>Reverb disconnected</h6><p>Retrying in 2s…</p></div></div>
  </div>
</body></html>
