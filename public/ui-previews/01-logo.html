<!doctype html>
<html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:24px;display:flex;align-items:center;gap:24px;background:#fff;font-family:var(--font-sans)}
  .plate{width:120px;height:120px;border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border-1)}
  .plate.dark{background:var(--brand-ink)}
  .plate.light{background:var(--brand-paper)}
  .plate img{width:78%;height:78%;object-fit:contain}
  .meta{display:flex;flex-direction:column;gap:6px}
  .meta .name{font-size:22px;font-weight:600;letter-spacing:-0.01em}
  .meta .file{font-family:var(--font-mono);font-size:12px;color:var(--fg-3)}
  .swatch-row{display:flex;gap:6px;margin-top:6px}
  .swatch{width:22px;height:22px;border-radius:6px;border:1px solid rgba(0,0,0,.08)}
</style></head>
<body>
  <div class="plate dark"><img src="assets/fancy-ui-logo.jpg" alt=""></div>
  <div class="plate light"><img src="assets/fancy-ui-logo.jpg" alt=""></div>
  <div class="meta">
    <div class="name">Fancy UI mark</div>
    <div class="file">assets/fancy-ui-logo.jpg · pixelated F · sky→violet gradient</div>
    <div class="swatch-row">
      <div class="swatch" style="background:#7dd3fc"></div>
      <div class="swatch" style="background:#818cf8"></div>
      <div class="swatch" style="background:#c4b5fd"></div>
      <div class="swatch" style="background:#0b0f1a"></div>
      <div class="swatch" style="background:#f4f4f5"></div>
    </div>
  </div>
</body></html>
