<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .card{border:1px solid var(--border-1);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
  .dot{width:14px;height:14px;border-radius:999px}
  .top{display:flex;align-items:center;gap:8px}
  .name{font-weight:600;font-size:14px}
  .meta{font-size:11px;color:var(--fg-3);font-family:var(--font-mono)}
  .ramp{display:flex;gap:2px;height:18px;margin-top:4px;border-radius:5px;overflow:hidden}
  .ramp div{flex:1}
</style></head>
<body>
  <div class="row">
    <div class="card">
      <div class="top"><div class="dot" style="background:#10b981"></div><div class="name">Success</div></div>
      <div class="meta">emerald · 500</div>
      <div class="ramp"><div style="background:#ecfdf5"></div><div style="background:#d1fae5"></div><div style="background:#34d399"></div><div style="background:#10b981"></div><div style="background:#059669"></div><div style="background:#047857"></div></div>
    </div>
    <div class="card">
      <div class="top"><div class="dot" style="background:#f59e0b"></div><div class="name">Warning</div></div>
      <div class="meta">amber · 500</div>
      <div class="ramp"><div style="background:#fffbeb"></div><div style="background:#fef3c7"></div><div style="background:#fcd34d"></div><div style="background:#f59e0b"></div><div style="background:#d97706"></div><div style="background:#b45309"></div></div>
    </div>
    <div class="card">
      <div class="top"><div class="dot" style="background:#ef4444"></div><div class="name">Danger</div></div>
      <div class="meta">red · 500</div>
      <div class="ramp"><div style="background:#fef2f2"></div><div style="background:#fca5a5"></div><div style="background:#ef4444"></div><div style="background:#dc2626"></div><div style="background:#b91c1c"></div><div style="background:#7f1d1d"></div></div>
    </div>
    <div class="card">
      <div class="top"><div class="dot" style="background:#0ea5e9"></div><div class="name">Info</div></div>
      <div class="meta">sky · 500</div>
      <div class="ramp"><div style="background:#f0f9ff"></div><div style="background:#bae6fd"></div><div style="background:#38bdf8"></div><div style="background:#0ea5e9"></div><div style="background:#0284c7"></div><div style="background:#0369a1"></div></div>
    </div>
  </div>
</body></html>
