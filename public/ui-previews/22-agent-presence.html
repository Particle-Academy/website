<!doctype html>
<html><head><meta charset="utf-8"><title>Agent presence</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:22px 24px;background:#fafafa;font-family:var(--font-sans);color:var(--fg-1)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .panel{border:1px solid #e4e4e7;background:#fff;border-radius:12px;padding:12px}
  .panel h6{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-3);font-weight:600;display:flex;align-items:center;gap:5px}
  .h-dot{width:6px;height:6px;border-radius:99px;background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.15)}
  .step{display:flex;gap:8px;font-size:12px;padding:5px 0;border-bottom:1px dashed #f4f4f5}
  .step:last-child{border:none}
  .step .t{font-family:var(--font-mono);color:var(--fg-3);min-width:34px}
  .step .lbl{flex:1}
  .step .ok{color:#10b981;font-family:var(--font-mono);font-size:11px}
  .cursor{position:relative;height:160px;border:1px dashed #c7d2fe;border-radius:10px;background:#fff;overflow:hidden}
  .cur{position:absolute;left:120px;top:55px;display:flex;flex-direction:column;align-items:flex-start}
  .arrow{width:14px;height:14px}
  .name{margin-top:2px;padding:2px 7px;font-size:11px;background:#818cf8;color:#fff;border-radius:5px;font-weight:500;font-family:var(--font-sans)}
  .pulse{position:absolute;left:180px;top:90px;width:80px;height:38px;border:2px solid #818cf8;border-radius:8px;animation:pulse 1.4s ease-out infinite}
  .pulse::after{content:"sticky";position:absolute;left:8px;top:8px;font-size:11px;color:var(--fg-2);font-family:var(--font-sans)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(129,140,248,.5)}70%{box-shadow:0 0 0 10px rgba(129,140,248,0)}100%{box-shadow:0 0 0 0 rgba(129,140,248,0)}}
</style></head>
<body>
  <div class="row">
    <div class="panel">
      <h6><span class="h-dot"></span>Agent — Claude · tool log</h6>
      <div class="step"><span class="t">14:22</span><span class="lbl">whiteboard_add_sticky · "Q4 priorities"</span><span class="ok">ok</span></div>
      <div class="step"><span class="t">14:22</span><span class="lbl">whiteboard_add_connector · sticky → KPI</span><span class="ok">ok</span></div>
      <div class="step"><span class="t">14:23</span><span class="lbl">whiteboard_set_viewport · zoom 1.4</span><span class="ok">ok</span></div>
      <div class="step"><span class="t">14:23</span><span class="lbl">whiteboard_add_stroke · pen layer</span><span class="ok">ok</span></div>
    </div>
    <div class="panel">
      <h6>On-canvas presence</h6>
      <div class="cursor">
        <div class="cur">
          <svg class="arrow" viewBox="0 0 16 16" fill="#818cf8"><path d="M1 1l5 14 2.5-5.5L14 7z"/></svg>
          <div class="name">Claude</div>
        </div>
        <div class="pulse"></div>
      </div>
    </div>
  </div>
</body></html>
