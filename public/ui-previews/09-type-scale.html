<!doctype html>
<html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:18px 24px;background:#fff;font-family:var(--font-sans);color:var(--fg-1)}
  table{border-collapse:collapse;width:100%}
  td{padding:4px 0;vertical-align:baseline}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:88px}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:48px}
  .sample{color:var(--fg-1)}
</style></head>
<body>
<table>
  <tr><td class="tok">text-6xl</td><td class="px">60</td><td class="sample" style="font-size:34px;font-weight:600;letter-spacing:-0.02em">Aa</td></tr>
  <tr><td class="tok">text-5xl</td><td class="px">48</td><td class="sample" style="font-size:30px;font-weight:600;letter-spacing:-0.02em">Aa</td></tr>
  <tr><td class="tok">text-4xl</td><td class="px">36</td><td class="sample" style="font-size:24px;font-weight:600">Aa Display</td></tr>
  <tr><td class="tok">text-3xl</td><td class="px">30</td><td class="sample" style="font-size:20px;font-weight:600">Aa Heading</td></tr>
  <tr><td class="tok">text-2xl</td><td class="px">24</td><td class="sample" style="font-size:18px;font-weight:600">Aa Heading</td></tr>
  <tr><td class="tok">text-xl</td><td class="px">20</td><td class="sample" style="font-size:16px;font-weight:600">Aa Sub-heading</td></tr>
  <tr><td class="tok">text-lg</td><td class="px">18</td><td class="sample" style="font-size:15px">Aa Lead</td></tr>
  <tr><td class="tok">text-base</td><td class="px">16</td><td class="sample" style="font-size:14px">Aa Body — default paragraph size</td></tr>
  <tr><td class="tok">text-sm</td><td class="px">14</td><td class="sample" style="font-size:13px;color:var(--fg-2)">Aa Small — secondary copy</td></tr>
  <tr><td class="tok">text-xs</td><td class="px">12</td><td class="sample" style="font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.04em">Aa Eyebrow / caption</td></tr>
</table>
</body></html>
