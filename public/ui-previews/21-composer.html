<!doctype html>
<html><head><meta charset="utf-8"><title>Composer</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:22px 24px;background:#fafafa;font-family:var(--font-sans);color:var(--fg-1)}
  .composer{border:1px solid #e4e4e7;background:#fff;border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:9px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .composer textarea{border:none;outline:none;resize:none;font-family:inherit;font-size:14px;color:var(--fg-1);line-height:1.45;height:54px;padding:0}
  .row{display:flex;justify-content:space-between;align-items:center}
  .tools{display:flex;gap:5px;color:var(--fg-3)}
  .tool{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .tool:hover{background:#f4f4f5;color:var(--fg-1)}
  .send{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:500;color:#fff;background:#3b82f6;border:1px solid #2563eb;border-radius:7px;padding:5px 11px;cursor:pointer}
  svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .hint{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-top:6px}
</style></head>
<body>
  <div class="composer">
    <textarea>Generate a Q4 sales sheet — three regions, currency + percent columns, totals row, and a comment on the YoY column.</textarea>
    <div class="row">
      <div class="tools">
        <div class="tool"><svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></div>
        <div class="tool"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
        <div class="tool"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      </div>
      <button class="send">Send <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
  </div>
  <div class="hint">Composer · cmd+enter sends · supports @-mentions, slash commands, file paste</div>
</body></html>
