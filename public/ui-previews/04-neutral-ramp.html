<!doctype html>
<html><head><meta charset="utf-8"><title>Neutral ramp</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(11,1fr);gap:4px}
  .col{display:flex;flex-direction:column;gap:4px;align-items:stretch}
  .sw{height:50px;border-radius:6px;border:1px solid rgba(0,0,0,.04)}
  .lbl{font-size:10px;text-align:center;font-family:var(--font-mono);color:var(--fg-3)}
  h6{margin:0 0 10px 0;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-3);font-weight:600}
  .title{display:flex;justify-content:space-between;align-items:baseline}
  .note{font-size:11px;color:var(--fg-3)}
</style></head>
<body>
  <div class="title"><h6>Zinc — the neutral spine</h6><span class="note">borders, text, surfaces</span></div>
  <div class="grid">
    <div class="col"><div class="sw" style="background:#fafafa"></div><div class="lbl">50</div></div>
    <div class="col"><div class="sw" style="background:#f4f4f5"></div><div class="lbl">100</div></div>
    <div class="col"><div class="sw" style="background:#e4e4e7"></div><div class="lbl">200</div></div>
    <div class="col"><div class="sw" style="background:#d4d4d8"></div><div class="lbl">300</div></div>
    <div class="col"><div class="sw" style="background:#a1a1aa"></div><div class="lbl">400</div></div>
    <div class="col"><div class="sw" style="background:#71717a"></div><div class="lbl">500</div></div>
    <div class="col"><div class="sw" style="background:#52525b"></div><div class="lbl">600</div></div>
    <div class="col"><div class="sw" style="background:#3f3f46"></div><div class="lbl">700</div></div>
    <div class="col"><div class="sw" style="background:#27272a"></div><div class="lbl">800</div></div>
    <div class="col"><div class="sw" style="background:#18181b"></div><div class="lbl">900</div></div>
    <div class="col"><div class="sw" style="background:#09090b"></div><div class="lbl">950</div></div>
  </div>
</body></html>
