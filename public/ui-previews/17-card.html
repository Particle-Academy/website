<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:22px 24px;background:#fafafa;font-family:var(--font-sans);color:var(--fg-1)}
  .card{background:#fff;border:1px solid #e4e4e7;border-radius:12px;overflow:hidden}
  .head{padding:11px 14px;border-bottom:1px solid #f4f4f5;display:flex;align-items:center;justify-content:space-between}
  .head h3{margin:0;font-size:14px;font-weight:600}
  .body{padding:14px;display:flex;align-items:end;gap:14px}
  .kpi{font-size:32px;font-weight:600;letter-spacing:-0.02em;line-height:1}
  .delta{font-size:12px;color:#059669;font-weight:500;display:inline-flex;gap:3px;align-items:center}
  .sparkline{flex:1;height:42px}
  .foot{padding:9px 14px;border-top:1px solid #f4f4f5;display:flex;justify-content:space-between;font-size:12px;color:var(--fg-3)}
  .pill{display:inline-flex;gap:5px;align-items:center;padding:2px 8px;background:#f4f4f5;border-radius:999px;font-size:11px;color:var(--fg-2);font-weight:500}
</style></head>
<body>
  <div class="card">
    <div class="head"><h3>Revenue · Q4</h3><span class="pill">Live</span></div>
    <div class="body">
      <div>
        <div class="kpi">$48.2k</div>
        <div class="delta">▲ 12.4% YoY</div>
      </div>
      <svg class="sparkline" viewBox="0 0 200 40" preserveAspectRatio="none">
        <polyline fill="none" stroke="#3b82f6" stroke-width="1.5" points="0,30 20,28 40,24 60,26 80,18 100,20 120,12 140,14 160,8 180,10 200,4"/>
        <polyline fill="rgba(59,130,246,0.08)" stroke="none" points="0,30 20,28 40,24 60,26 80,18 100,20 120,12 140,14 160,8 180,10 200,4 200,40 0,40"/>
      </svg>
    </div>
    <div class="foot"><span>Updated 2m ago</span><span>From Stripe</span></div>
  </div>
</body></html>
