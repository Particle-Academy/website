<!doctype html>
<html><head><meta charset="utf-8"><title>Action colors</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .col{display:flex;flex-direction:column;gap:6px;align-items:center}
  .sw{width:100%;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:500;font-size:12px;font-family:var(--font-mono)}
  .lbl{font-size:11px;color:var(--fg-3);font-family:var(--font-mono)}
  .row{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .row .title{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-3);font-weight:600}
</style></head>
<body>
  <div class="row">
    <div class="title">Action colors — 10 named tones (solid)</div>
    <div class="grid">
      <div class="col"><div class="sw" style="background:#3b82f6;border:1px solid #2563eb">blue</div><div class="lbl">500/600</div></div>
      <div class="col"><div class="sw" style="background:#10b981;border:1px solid #059669">emerald</div><div class="lbl">500/600</div></div>
      <div class="col"><div class="sw" style="background:#f59e0b;border:1px solid #d97706">amber</div><div class="lbl">500/600</div></div>
      <div class="col"><div class="sw" style="background:#ef4444;border:1px solid #dc2626">red</div><div class="lbl">500/600</div></div>
      <div class="col"><div class="sw" style="background:#8b5cf6;border:1px solid #7c3aed">violet</div><div class="lbl">500/600</div></div>
      <div class="col"><div class="sw" style="background:#6366f1;border:1px solid #4f46e5">indigo</div><div class="lbl">500/600</div></div>
      <div class="col"><div class="sw" style="background:#0ea5e9;border:1px solid #0284c7">sky</div><div class="lbl">500/600</div></div>
      <div class="col"><div class="sw" style="background:#f43f5e;border:1px solid #e11d48">rose</div><div class="lbl">500/600</div></div>
      <div class="col"><div class="sw" style="background:#f97316;border:1px solid #ea580c">orange</div><div class="lbl">500/600</div></div>
      <div class="col"><div class="sw" style="background:#71717a;border:1px solid #52525b">zinc</div><div class="lbl">500/600</div></div>
    </div>
  </div>
</body></html>
