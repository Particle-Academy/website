<!doctype html>
<html><head><meta charset="utf-8"><title>Mono &amp; code</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body{margin:0;padding:22px 24px;background:#fff;font-family:var(--font-sans);color:var(--fg-1)}
  pre{margin:0;background:#fafafa;border:1px solid var(--border-1);border-radius:10px;padding:12px 14px;font-family:var(--font-mono);font-size:13px;line-height:1.55;color:var(--fg-1);overflow:auto}
  .k{color:#7c3aed}
  .s{color:#059669}
  .c{color:#a1a1aa}
  .lit{color:#2563eb}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-top:10px}
  code.inline{font-family:var(--font-mono);font-size:13px;background:#f4f4f5;border:1px solid var(--border-1);padding:1px 6px;border-radius:4px;color:var(--fg-1)}
  p{font-size:14px;color:var(--fg-2);margin:0 0 10px}
</style></head>
<body>
  <p>Selector for the button root: <code class="inline">[data-react-fancy-action]</code></p>
<pre><span class="k">import</span> { Action, Modal } <span class="k">from</span> <span class="s">"@particle-academy/react-fancy"</span>;

<span class="c">// loading + emerald = checked confirm flow</span>
&lt;Action color=<span class="s">"emerald"</span> loading={<span class="lit">isSaving</span>}&gt;Save&lt;/Action&gt;</pre>
  <div class="meta">Geist Mono · 13px · line-height 1.55</div>
</body></html>
